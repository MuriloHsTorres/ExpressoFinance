# ==========================================
# CONFIGURAĮÕES DO SERVIDOR
# ==========================================
server.port=8080
spring.application.name=Expresso Finance

# ==========================================
# CONFIGURAĮÕES DO BANCO DE DADOS MYSQL
# (Credenciais carregadas de variáveis de ambiente por seguranįa)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/expressodb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=1234

# ==========================================
# CONFIGURAĮÕES DO JPA/HIBERNATE
# ==========================================
# 'validate' é mais seguro para produįão. Use uma ferramenta como Flyway ou Liquibase para gerenciar o schema.
# Caso reclame dos nomes troque o validate por update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# CONFIGURAĮÕES DO JWT
# ==========================================
# Use a chave diretamente no arquivo por enquanto para facilitar o desenvolvimento
jwt.secret=sua-chave-secreta-muito-segura-e-longa-para-ser-forte
jwt.expiration=86400000

# ==========================================
# CONFIGURAĮÕES DE LOGS
# (Em produįão, considere mudar os níveis para INFO ou WARN para menos ruído)
# ==========================================
logging.level.com.expresso.finance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE