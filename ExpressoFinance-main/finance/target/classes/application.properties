# ==========================================
# CONFIGURAïŋ―ïŋ―ES DO SERVIDOR
# ==========================================
server.port=8080
spring.application.name=Expresso Finance

# ==========================================
# CONFIGURAïŋ―ïŋ―ES DO BANCO DE DADOS MYSQL
# (Credenciais carregadas de variïŋ―veis de ambiente por seguranïŋ―a)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/expressodb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=1234

# ==========================================
# CONFIGURAïŋ―ïŋ―ES DO JPA/HIBERNATE
# ==========================================
# 'validate' ïŋ― mais seguro para produïŋ―ïŋ―o. Use uma ferramenta como Flyway ou Liquibase para gerenciar o schema.
# Caso reclame dos nomes troque o validate por update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# CONFIGURAïŋ―ïŋ―ES DO JWT
# ==========================================
# Use a chave diretamente no arquivo por enquanto para facilitar o desenvolvimento
jwt.secret=sua-chave-secreta-muito-segura-e-longa-para-ser-forte
jwt.expiration=86400000

# ==========================================
# CONFIGURAïŋ―ïŋ―ES DE LOGS
# (Em produïŋ―ïŋ―o, considere mudar os nïŋ―veis para INFO ou WARN para menos ruïŋ―do)
# ==========================================
logging.level.com.expresso.finance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE