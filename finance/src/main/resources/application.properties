# ==========================================
# CONFIGURAúíES DO SERVIDOR
# ==========================================
server.port=8080
spring.application.name=Expresso Finance

# ==========================================
# CONFIGURAúíES DO BANCO DE DADOS MYSQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/expressodb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURAúíES DO JPA/HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# CONFIGURAúíES DO JWT
# ==========================================
jwt.secret=ExpressoFinanceSecretKeyMuitoSegura2025!@#$%
jwt.expiration=86400000

# ==========================================
# CONFIGURAúíES DE ENCODING
# ==========================================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ==========================================
# CONFIGURAúíES DE LOGS
# ==========================================
logging.level.com.expresso.finance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE